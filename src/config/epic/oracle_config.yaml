tracking:
  split: train
  force_rewrite: true
  save_training_data: true
  pca_dim: 256
  matcher_type: oracle
  matcher_params:
    app_representation: denstream
    app_aggregation: clusters
    loc_representation: one_second_window
    loc_aggregation: nearest_neighbour
    denstream_params:
      max_radius: 0.25
      mu: 10.0
      decay_rate: 1e-3

paths:
  observation_dir: data/epic_osnom/observations
  train_data_dir: data/training_data
  track_out_dir: outputs/oracle
  video_info_file: data/epic_osnom/EPIC_100_video_info.csv

