tracking:
  split: test
  force_rewrite: true
  gpu_accelerate: true
  pca_dim: 256
  matcher_type: whareformer
  matcher_params:
    app_representation: denstream
    app_aggregation: clusters
    loc_representation: one_second_window
    loc_aggregation: nearest_neighbour
    denstream_params:
      max_radius: 0.25
      mu: 10.0
      decay_rate: 1e-3
    model_path: data/model_weights/whareformer/model_epoch100.pt
model:
  name: whareformer
  architecture:
    app_dim: 256
    hidden_dim: 64
    depth: 1
    num_heads: 32
    emb_dropout: 0.1
    enc_dropout: 0.1
  training:
    lr: 1e-4
    weight_decay: 5e-3
    loss: ce
    epochs: 100
    batch_size: 256
    num_workers: 8
    seed: 3078117200
    scheduler:
      scheduler_type: linear_warmup+cosine
      warmup_epochs: 5
    logging:
      enable_wandb: false
      project_name: object-tracking
      run_name: whareformer
paths:
  observation_dir: data/epic_osnom/observations
  train_data_dir: data/training_data
  train_out_dir: data/model_weights
  track_out_dir: outputs/epic/whareformer
  video_info_file: data/epic_osnom/EPIC_100_video_info.csv
