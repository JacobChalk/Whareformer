tracking:
  split: test
  force_rewrite: true
  gpu_accelerate: true
  pca_dim: 256
  matcher_type: whareformer
  matcher_params:
    app_representation: denstream
    app_aggregation: clusters
    loc_representation: one_second_window
    loc_aggregation: nearest_neighbour
    denstream_params:
      max_radius: 0.25
      mu: 10.0
      decay_rate: 1e-3
    model_path: data/model_weights/whareformer/model_epoch100.pt

model:
  name: whareformer
  architecture:
    app_dim: 256
    hidden_dim: 64
    depth: 1
    num_heads: 32
    emb_dropout: 0.1
    enc_dropout: 0.1

paths:
  observation_dir: data/it3dego_osnom/observations
  track_out_dir: outputs/it3dego/whareformer
  video_info_file: data/it3dego_osnom/IT3DEgo_video_info.csv

